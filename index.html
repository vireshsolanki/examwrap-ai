  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            background: '#0a0a0c',
            surface: '#111114',
            border: 'rgba(255,255,255,0.05)',
            primary: 'var(--primary)',
            primaryHover: 'var(--primary-hover)',
            secondary: 'var(--secondary)',
            accent: 'var(--accent)',
            text: {
              primary: '#ffffff',
              secondary: '#94a3b8',
              tertiary: '#475569'
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.4s ease-out forwards',
            'slide-up': 'slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            'pulse-soft': 'pulseSoft 3s ease-in-out infinite',
            'float': 'float 5s ease-in-out infinite',
            'fade-out': 'fadeOut 0.4s ease-out forwards',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            fadeOut: { '0%': { opacity: '1' }, '100%': { opacity: '0' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            pulseSoft: { '0%, 100%': { opacity: '0.6' }, '50%': { opacity: '1' } },
            float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-8px)' } }
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --background: #0a0a0c;
      --primary: #06b6d4;
      --primary-hover: #0891b2;
      --secondary: #a855f7;
      --accent: #f43f5e;
      --bg-gradient: radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.05) 0%, transparent 70%);
    }

    [data-theme="upsc"] {
      --primary: #f59e0b;
      --primary-hover: #d97706;
      --secondary: #6366f1;
      --accent: #ef4444;
      --bg-gradient: radial-gradient(circle at 50% 10%, rgba(245, 158, 11, 0.08) 0%, transparent 60%);
    }

    [data-theme="jee_neet"] {
      --primary: #22d3ee;
      --primary-hover: #0891b2;
      --secondary: #10b981;
      --accent: #f43f5e;
      --bg-gradient: radial-gradient(circle at 50% 50%, rgba(34, 211, 238, 0.07) 0%, transparent 70%);
    }

    [data-theme="ca_cfa"] {
      --primary: #10b981;
      --primary-hover: #059669;
      --secondary: #475569;
      --accent: #334155;
      --bg-gradient: radial-gradient(circle at 20% 20%, rgba(16, 185, 129, 0.06) 0%, transparent 50%);
    }

    [data-theme="sat_cat"] {
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --secondary: #ec4899;
      --accent: #d946ef;
      --bg-gradient: radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.07) 0%, transparent 60%);
    }

    body {
      background-color: var(--background);
      min-height: 100vh;
      color: #f1f5f9;
      overflow-x: hidden;
      font-feature-settings: "cv11", "ss01";
      -webkit-font-smoothing: antialiased;
      transition: all 0.5s ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        var(--bg-gradient),
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 100% 100%, 60px 60px, 60px 60px;
      transition: background-image 0.8s ease;
    }

    .glass-header {
      background: rgba(10, 10, 12, 0.85);
      backdrop-filter: blur(24px) saturate(1.8);
      -webkit-backdrop-filter: blur(24px) saturate(1.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 16px;
    }

    .glass-card:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(129, 140, 248, 0.5);
      /* Indigo accent on hover */
    }

    .btn-primary {
      background: #6366f1;
      transition: all 0.2s ease;
      border-radius: 14px;
    }

    .btn-primary:hover {
      background: #4f46e5;
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Mobile-first responsive utilities */
    * {
      -webkit-tap-highlight-color: transparent;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .custom-scrollbar {
      -webkit-overflow-scrolling: touch;
    }

    /* Safe areas for notched phones */
    @supports(padding: max(0px)) {
      body {
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
      }
    }

    /* Mobile specific overrides */
    @media (max-width: 640px) {
      .glass-card {
        border-radius: 12px;
      }

      /* Prevent zoom on input focus on iOS */
      input,
      select,
      textarea {
        font-size: 16px !important;
      }

      /* Smooth momentum scrolling */
      .overflow-y-auto,
      .overflow-x-auto {
        -webkit-overflow-scrolling: touch;
      }
    }

    /* Animations */
    .fade-in {
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-out {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    .animate-fade-out {
      animation: fade-out 0.3s ease-out forwards;
    }

    @media print {
      body * {
        visibility: hidden;
      }

      #printable-summary,
      #printable-summary *,
      #printable-exam,
      #printable-exam * {
        visibility: visible;
      }

      #printable-summary,
      #printable-exam {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        background: white;
        color: black;
        padding: 20px;
      }

      .no-print {
        display: none !important;
      }
    }
  </style>
