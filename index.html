<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExamWarp | AI Exam Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              background: '#030712', // Void Black
              surface: '#0f172a',    // Deep Slate
              border: '#1e293b',     // Slate 800
              primary: '#06b6d4',    // Cyan 500 (Intellect)
              primaryHover: '#0891b2', // Cyan 600
              secondary: '#8b5cf6',  // Violet 500 (Creative)
              accent: '#f43f5e',     // Rose 500 (Alert)
              text: {
                primary: '#f8fafc',  // Slate 50
                secondary: '#94a3b8', // Slate 400
                tertiary: '#64748b'   // Slate 500
              }
            },
            animation: {
                'fade-in': 'fadeIn 0.5s ease-out forwards',
                'slide-up': 'slideUp 0.5s ease-out forwards',
                'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                'float': 'float 6s ease-in-out infinite',
            },
            keyframes: {
                fadeIn: {
                    '0%': { opacity: '0' },
                    '100%': { opacity: '1' },
                },
                slideUp: {
                    '0%': { opacity: '0', transform: 'translateY(10px)' },
                    '100%': { opacity: '1', transform: 'translateY(0)' },
                },
                float: {
                  '0%, 100%': { transform: 'translateY(0)' },
                  '50%': { transform: 'translateY(-10px)' },
                }
            }
          }
        }
      }
    </script>
    <style>
        :root {
            --background: #030712;
            --primary-glow: rgba(6, 182, 212, 0.15);
        }

        body {
             background-color: var(--background);
             min-height: 100vh;
             color: #f8fafc;
             font-feature-settings: "cv11", "ss01";
             -webkit-font-smoothing: antialiased;
             -moz-osx-font-smoothing: grayscale;
             position: relative;
             z-index: 1;
        }

        /* Neural Network Dot Pattern Background */
        body::before {
             content: "";
             position: fixed;
             inset: 0;
             z-index: -1;
             background-color: var(--background);
             background-image: 
                radial-gradient(var(--primary-glow) 1px, transparent 1px),
                radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px);
             background-size: 40px 40px;
             background-position: 0 0, 20px 20px;
             /* Fade out at bottom */
             mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
             -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
             pointer-events: none;
        }

        /* Top Glow Spot */
        body::after {
            content: "";
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 200px;
            background: radial-gradient(ellipse at center, rgba(6, 182, 212, 0.15) 0%, transparent 70%);
            z-index: -1;
            pointer-events: none;
            filter: blur(60px);
        }

        /* Info Genius Glass Panel */
        .glass-panel {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
        }
        
        /* Tech Border Highlight on Top */
        .glass-panel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.5), transparent);
            opacity: 0.5;
        }
        
        .glass-header {
             background: rgba(3, 7, 18, 0.85);
             backdrop-filter: blur(12px);
             border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Enterprise Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #06b6d4; /* Cyan hover */
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #06b6d4;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
            border: 2px solid #fff;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 2px;
        }

        /* Smooth Scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Print Styles */
        @media print {
            body * {
                visibility: hidden;
            }
            #printable-summary, #printable-summary * {
                visibility: visible;
            }
            #printable-summary {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                background: white;
                color: black;
                padding: 20px;
            }
            .no-print {
                display: none !important;
            }
            .prose {
                color: black !important;
            }
        }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",

  }
}
</script>
</head>

    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
