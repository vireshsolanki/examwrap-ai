<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExamWarp | Academic Success Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            background: '#0f1115', // Lighter Deep Space
            surface: '#181b21',    // Visible Slate
            border: '#2d3342',     // Lighter Border
            primary: '#818cf8',    // Brighter Indigo
            secondary: '#c084fc',  // Bighter Purple
            accent: '#fb7185',     // Brighter Rose
            text: {
              primary: '#ffffff',    // Pure White
              secondary: '#cbd5e1',  // Slate 300 (High vis)
              tertiary: '#94a3b8'    // Slate 400
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.4s ease-out forwards',
            'slide-up': 'slideUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
            'pulse-soft': 'pulseSoft 3s ease-in-out infinite',
            'float': 'float 5s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideUp: { '0%': { opacity: '0', transform: 'translateY(12px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            pulseSoft: { '0%, 100%': { opacity: '0.6' }, '50%': { opacity: '1' } },
            float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-8px)' } }
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --background: #0f1115;
    }

    body {
      background-color: var(--background);
      min-height: 100vh;
      color: #f1f5f9;
      overflow-x: hidden;
      font-feature-settings: "cv11", "ss01";
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image:
        radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.05) 0%, transparent 70%),
        linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
      background-size: 100% 100%, 60px 60px, 60px 60px;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.08);
      /* Much brighter background */
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      /* Stronger border */
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 16px;
      /* Slightly tighter radius */
    }

    .glass-card:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(129, 140, 248, 0.5);
      /* Indigo accent on hover */
    }

    .btn-primary {
      background: #6366f1;
      transition: all 0.2s ease;
      border-radius: 14px;
    }

    .btn-primary:hover {
      background: #4f46e5;
      transform: translateY(-2px);
      box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    @media print {
      body * {
        visibility: hidden;
      }

      #printable-summary,
      #printable-summary *,
      #printable-exam,
      #printable-exam * {
        visibility: visible;
      }

      #printable-summary,
      #printable-exam {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        background: white;
        color: black;
        padding: 20px;
      }

      .no-print {
        display: none !important;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
    "pdfjs-dist": "https://cdn.jsdelivr.net/npm/pdfjs-dist@5.4.530/build/pdf.min.mjs",
    "next/": "https://esm.sh/next@^16.0.8/"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
