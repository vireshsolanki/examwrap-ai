<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ExamWarp AI | Enterprise Exam Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              background: '#09090b',
              surface: '#18181b',
              border: '#27272a',
              primary: '#2563eb', // Standard Blue
              primaryHover: '#1d4ed8',
              text: {
                primary: '#f4f4f5',
                secondary: '#a1a1aa',
                tertiary: '#71717a'
              }
            },
            animation: {
                'fade-in': 'fadeIn 0.5s ease-out forwards',
                'slide-up': 'slideUp 0.5s ease-out forwards',
            },
            keyframes: {
                fadeIn: {
                    '0%': { opacity: '0' },
                    '100%': { opacity: '1' },
                },
                slideUp: {
                    '0%': { opacity: '0', transform: 'translateY(10px)' },
                    '100%': { opacity: '1', transform: 'translateY(0)' },
                }
            }
          }
        }
      }
    </script>
    <style>
        :root {
            --background: #09090b;
            --surface: #18181b;
            --border: #27272a;
        }

        body {
             background-color: var(--background);
             /* Subtle grid pattern for professional look */
             background-image: linear-gradient(to right, #27272a 1px, transparent 1px),
                               linear-gradient(to bottom, #27272a 1px, transparent 1px);
             background-size: 40px 40px;
             background-blend-mode: overlay;
             /* Mask the grid to fade out */
             mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%);
             -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 40%, rgba(0,0,0,0) 100%);
             color: #f4f4f5;
             font-feature-settings: "ss01", "cv01";
             -webkit-font-smoothing: antialiased;
             -moz-osx-font-smoothing: grayscale;
        }
        
        /* Enterprise Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46; 
        }

        /* Utility classes */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        
        /* Form inputs specific reset */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 0 1px #27272a;
        }

        /* Custom Scrollbar for inner containers */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 2px;
        }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.556.0",
    "recharts": "https://aistudiocdn.com/recharts@^3.5.1",
    "pdfjs-dist": "https://aistudiocdn.com/pdfjs-dist@^5.4.449"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
